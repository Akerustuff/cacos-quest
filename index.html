<!DOCTYPE html>                                                                                                                                                                                                                                                     
  <html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cacos Quest</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body>

    <!-- PANTALLA: Selección de jugador -->
    <div id="screen-player" class="screen">
      <h1>Cacos Quest</h1>
      <p>¿Quién eres?</p>
      <div class="player-buttons">
        <button onclick="selectPlayer('mono')">🐒 Mono</button>
        <button onclick="selectPlayer('oso')">🐻 Oso</button>
      </div>
    </div>

    <!-- PANTALLA: Menú principal -->
    <div id="screen-menu" class="screen hidden">
      <div class="menu-header">
        <span id="player-name"></span>
        <button onclick="changePlayer()">Cambiar jugador</button>
      </div>
      <div class="menu-options">
        <button onclick="navigate('missions')">⚔️ Misiones</button>
        <button onclick="navigate('provisions')">🛒 Provisiones</button>
        <button onclick="navigate('battlepass')">🏆 Pase de batalla</button>
      </div>
    </div>

    <!-- PANTALLA: Misiones -->
    <div id="screen-missions" class="screen hidden">
      <button onclick="navigate('menu')">← Volver</button>
      <h2>Misiones</h2>
      <p>Próximamente...</p>
    </div>

    <!-- PANTALLA: Provisiones -->
    <div id="screen-provisions" class="screen hidden">
      <button onclick="navigate('menu')">← Volver</button>
      <h2>Provisiones</h2>
      <p>Próximamente...</p>
    </div>

    <!-- PANTALLA: Pase de batalla -->
    <div id="screen-battlepass" class="screen hidden">
      <button onclick="navigate('menu')">← Volver</button>
      <h2>Pase de batalla</h2>
      <p>Próximamente...</p>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <!-- App -->
    <script src="js/storage.js"></script>
    <script src="js/players.js"></script>
    <script src="js/app.js"></script>

  </body>
  </html>
